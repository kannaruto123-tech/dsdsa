
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Лины</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  color:white;
  overflow-x:hidden;
  background:
    linear-gradient(rgba(10,0,15,0.85),rgba(10,0,15,0.85)),
    url('https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=1600&q=80');
  background-size:cover;
  background-attachment:fixed;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:60px 20px;
  text-align:center;
}

h1{
  font-size:60px;
  letter-spacing:2px;
}

.glass{
  margin-top:20px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(14px);
  padding:20px;
  border-radius:20px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-top:40px;
}

.photo img{
  width:100%;
  height:320px;
  object-fit:cover;
  border-radius:16px;
  transition:0.3s;
}
.photo img:hover{transform:scale(1.05);}

button{
  padding:12px 20px;
  margin-top:20px;
  border:none;
  border-radius:12px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
  font-size:16px;
}

#letter{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.box{
  background:#1a0015;
  padding:30px;
  border-radius:16px;
  max-width:600px;
  border:1px solid rgba(255,255,255,0.2);
}

/* floating cats */
.cat{
  position:fixed;
  width:120px;
  opacity:0.2;
  animation:float 6s ease-in-out infinite;
}
.cat1{top:10%;left:5%;}
.cat2{bottom:10%;right:5%;}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}
</style>
</head>

<body>

<img class="cat cat1" src="https://i.imgur.com/4M7IWwP.png">
<img class="cat cat2" src="https://i.imgur.com/4M7IWwP.png">

<div class="container">
<h1>Для Лины</h1>

<div class="glass">
Мы вместе уже
<div id="timer"></div>
с 4 мая
</div>

<button onclick="openLetter()">Открыть письмо</button>

<div class="gallery">
<div class="photo"><img src="lina1.jpg"></div>
<div class="photo"><img src="lina2.jpg"></div>
<div class="photo"><img src="lina3.jpg"></div>
</div>
</div>

<div id="letter">
  <div class="box">
    <h2>Лина</h2>
    <p style="margin-top:15px;line-height:1.6;">
    Лина я рад что ты появилась в моей жизни я люблю тебя любой и продолжу любить тебя всегда,
    давай вместе справимся с нашими проблемами мы будем решать вместе как пара.
    Люблю тебя.
    </p>
    <button onclick="closeLetter()">Закрыть</button>
  </div>
</div>

<script>
const start=new Date("2026-05-04");

function update(){
 const now=new Date();
 const d=Math.floor((now-start)/86400000);
 const h=Math.floor((now/3600000)%24);
 const m=Math.floor((now/60000)%60);
 document.getElementById("timer").innerText=
 d+" дней "+h+" часов "+m+" минут";
}
setInterval(update,1000);update();

function openLetter(){document.getElementById("letter").style.display="flex";}
function closeLetter(){document.getElementById("letter").style.display="none";}
</script>

</body>
</html>
